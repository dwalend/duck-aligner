$schema: https://raw.githubusercontent.com/oyvindberg/bleep/master/schema.json
$version: 0.0.14
jvm:
  name: corretto:25.0.2.10.1
projects:
  BleepScripts:
    dependencies:
    - build.bleep::bleep-core:${BLEEP_VERSION}
    - build.bleep::bleep-model:${BLEEP_VERSION}
    - com.github.mwiede:jsch:2.28.0
    - org.apache.ant:ant-jsch:1.10.16
    - org.scalablytyped.converter::cli:1.0.0-beta45
    - org.slf4j:slf4j-simple:2.0.17
    - software.amazon.awssdk:apigateway:2.42.28
    - software.amazon.awssdk:ec2:2.42.28
    - software.amazon.awssdk:s3:2.42.28
    extends: template-jvm
  DuckStudio:
    dependencies: org.creativescala::doodle:0.34.0
    extends: template-jvm
  DuckUpdateBrowser:
    dependencies:
    - com.armanbilge::calico:0.2.3
    - org.creativescala::doodle:0.34.0
    - org.http4s::http4s-dom:0.2.12
    dependsOn:
    - DuckUpdateSmithy
    - MapLibreGlScalablyTyped
    extends: template-js
    platform:
      mainClass: net.walend.duck.front.Main
  DuckUpdateService:
    dependencies:
    - org.http4s::http4s-circe:0.23.33
    - org.http4s::http4s-dsl:0.23.33
    - org.http4s::http4s-ember-client:0.23.33
    - org.http4s::http4s-ember-server:0.23.33
    - org.slf4j:slf4j-simple:2.0.17
    - org.typelevel::log4cats-core:2.8.0
    - org.typelevel::log4cats-slf4j:2.8.0
    - software.amazon.awssdk:geomaps:2.42.28
    dependsOn: DuckUpdateSmithy
    extends: template-jvm
    platform:
      mainClass: net.walend.duckaligner.duckupdateservice.Main
    resources: ../.bleep/builds/normal/.bloop/DuckUpdateBrowser/DuckUpdateBrowser-js
  DuckUpdateServiceTest:
    dependencies:
    - org.scalameta::munit:1.2.4
    - org.typelevel::munit-cats-effect:2.2.0
    dependsOn: DuckUpdateService
    extends: template-jvm
    isTestProject: true
  DuckUpdateSmithy:
    cross:
      js: {}
      jvm: {}
    dependencies:
    - com.disneystreaming.alloy:alloy-core:0.3.38
    - com.disneystreaming.smithy4s::smithy4s-http4s:0.18.50
    extends: template-cross
    sourcegen:
      main: bleep.scripts.smithy4s.GenerateSmithyScala
      project: GenSmithy
  GenSmithy:
    dependencies:
    - build.bleep::bleep-core:${BLEEP_VERSION}
    - build.bleep::bleep-model:${BLEEP_VERSION}
    - com.disneystreaming.smithy4s:smithy4s-codegen_2.13:0.18.50
    extends: template-jvm
  MapLibreGlScalablyTyped:
    dependencies:
    - com.olvind::scalablytyped-runtime:2.4.2
    - org.scala-js::scalajs-dom:2.8.1
    extends: template-js
    scala:
      options: -nowarn
    sourcegen:
      main: bleep.scripts.scalablytyped.ScalablyTypedGenerator
      project: BleepScripts
  TestFatJar:
    dependencies: org.typelevel::cats-effect:3.7.0
    extends: template-jvm
    platform:
      mainClass: net.walend.fatjar.Main
  WoodenDuck:
    dependencies: org.http4s::http4s-ember-client:0.23.33
    dependsOn: DuckUpdateSmithy
    extends: template-jvm
    platform:
      mainClass: net.walend.duckaligner.wooden.Main
scripts:
  create-api-gateway:
    main: bleep.scripts.aws.CreateApiGateway
    project: BleepScripts
  create-ec2-launch-template:
    main: bleep.scripts.aws.CreateEc2LaunchTemplate
    project: BleepScripts
  delete-api-gateways:
    main: bleep.scripts.aws.DeleteApiGateways
    project: BleepScripts
  fat-duck-update:
    main: bleep.scripts.webapp.FatDuckUpdate
    project: BleepScripts
  fat-jar:
    main: bleep.scripts.fatjar.FatJar
    project: BleepScripts
  push-duck-update:
    main: bleep.scripts.aws.PushDuckUpdateServiceToEc2
    project: BleepScripts
  push-to-ec2:
    main: bleep.scripts.aws.PushServiceToEc2
    project: BleepScripts
  start-duck-update:
    main: bleep.scripts.aws.StartTestDuckUpdateService
    project: BleepScripts
  start-ec2:
    main: bleep.scripts.aws.StartEc2Machine
    project: BleepScripts
  stc:
    main: bleep.scripts.scalablytyped.ScalablyTypedGenerator
    project: BleepScripts
  stop-duck-update:
    main: bleep.scripts.aws.StopTestDuckUpdateService
    project: BleepScripts
  stop-ec2:
    main: bleep.scripts.aws.TerminateEc2Machine
    project: BleepScripts
templates:
  template-common:
    scala:
      options: -Wconf:any:warning-verbose -Wnonunit-statement -Wunused:explicits -Wunused:implicits
        -Wunused:imports -Wunused:locals -Wunused:params -Wvalue-discard -Ykind-projector
        -deprecation -encoding utf8 -feature -language:experimental.macros -language:higherKinds
        -unchecked
      strict: true
      version: 3.3.7
  template-cross:
    cross:
      js:
        extends: template-js
      jvm:
        extends: template-jvm
  template-js:
    extends: template-common
    platform:
      jsNodeVersion: 21.7.2
      jsVersion: 1.20.2
      name: js
  template-jvm:
    extends: template-common
    platform:
      name: jvm
